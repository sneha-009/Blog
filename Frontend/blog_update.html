<!DOCTYPE html>

<html>
<head>
    <title>My Blog</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

```
<h1>My Blog</h1>

<p>
    <a href="/blog/create" class="btn btn-green">
        Create New Post
    </a>
</p>

{% if posts %}

    {% for post in posts %}

    <div class="card">

        <h2>{{ post.title }}</h2>

        <p class="meta">
            By {{ post.author }}
        </p>

        <p>
            {{ post.content[:200] }}
            {% if post.content|length > 200 %}
                ...
            {% endif %}
        </p>

        <a href="/blog/{{ post.id }}" class="btn btn-blue">
            Read More
        </a>

        <a href="/blog/update/{{ post.id }}" class="btn btn-green">
            Edit
        </a>

        <form action="/blog/delete/{{ post.id }}"
              method="post"
              style="display:inline;"
              onsubmit="return confirm('Are you sure you want to delete this post?');">

            <button type="submit" class="btn btn-red">
                Delete
            </button>

        </form>

    </div>

    {% endfor %}

{% else %}

    <div class="card">
        <p>No blog posts available.</p>
    </div>

{% endif %}
```

</div>

</body>
</html>
